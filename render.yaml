# render.yaml — MVR Consultants Backend
# Deploys the Rust/Axum API as a Docker-based Web Service on Render
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Redis — admin session revocation (logout blocklist) ─────────────────────
  - type: redis
    name: mvr-redis
    region: singapore
    plan: free
    ipAllowList: [] # Render services in same account can connect
    maxmemoryPolicy: allkeys-lru

  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: mvr-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore
    plan: free
    healthCheckPath: /health

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: BACKEND_HOST
        value: "0.0.0.0"

      # Render injects PORT automatically — no need to set it here

      # ── Database ─────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ── JWT ──────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: JWT_REFRESH_EXPIRY_DAYS
        value: "30"

      # ── CORS ─────────────────────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

      # ── Cloudinary ────────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false

      # ── Email / Resend ────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@mvrconsultants.org
      - key: EMAIL_FROM_NAME
        value: "MVR Consultants"
      - key: ADMIN_EMAIL
        value: guntur@mvrconsultants.org
      - key: ADMIN_EMAIL_GUNTUR
        value: guntur@mvrconsultants.org

      # ── Redis — auto-wired from mvr-redis service above ───────────────────
      - key: REDIS_URL
        fromService:
          type: redis
          name: mvr-redis
          property: connectionString

      # ── AI / Gemini (SOP Reviewer) ────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      # ── Logging & proxy ───────────────────────────────────────────────────
      - key: RUST_LOG
        value: info
      - key: TRUST_PROXY_HEADERS
        value: "true"
