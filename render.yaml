# render.yaml — MVR Consultants Backend
# Deploys the Rust/Axum API as a Docker-based Web Service on Render
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: mvr-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore          # closest to Hyderabad
    plan: free
    healthCheckPath: /health

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: BACKEND_HOST
        value: "0.0.0.0"

      # Render injects PORT automatically — no need to set it here

      # ── Database ─────────────────────────────────────────────────────────
      # Set this in Render dashboard → Environment (keep secret)
      - key: DATABASE_URL
        sync: false            # means: set manually in dashboard, not in this file

      # ── JWT ──────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: JWT_REFRESH_EXPIRY_DAYS
        value: "30"

      # ── CORS ─────────────────────────────────────────────────────────────
      # Set BOTH of these in Render dashboard → Environment:
      #   FRONTEND_URL   = https://www.mvrconsultants.org
      #   ALLOWED_ORIGINS = https://www.mvrconsultants.org
      # (Must exactly match the Origin header browsers send from Vercel)
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

      # ── Cloudinary ────────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false

      # ── Email / Resend ────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@mvrconsultants.org
      - key: EMAIL_FROM_NAME
        value: "MVR Consultants"
      # L-2 fix: real admin emails are set in Render dashboard (not hardcoded in source)
      - key: ADMIN_EMAIL
        sync: false   # Set in Render dashboard → Environment
      - key: ADMIN_EMAIL_GUNTUR
        sync: false   # Set in Render dashboard → Environment

      # ── Redis (C-1 security fix: persistent JTI blocklist) ────────────────
      # Provision a Render Redis instance and paste the External URL here.
      # Go to: Render Dashboard → New → Redis → Copy External Connection String
      - key: REDIS_URL
        sync: false   # Set in Render dashboard → Environment

      # ── AI / Gemini (used by SOP Reviewer) ────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false   # Set manually in Render Dashboard → Environment

      # ── Logging ───────────────────────────────────────────────────────────
      - key: RUST_LOG
        value: info

      # ── Proxy ─────────────────────────────────────────────────────────────
      - key: TRUST_PROXY_HEADERS
        value: "true"
