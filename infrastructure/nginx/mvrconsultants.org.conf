# =============================================================================
# ⚠️  ARCHIVED — NOT IN USE
# =============================================================================
# Deployment architecture:
#   Frontend → Vercel  (www.mvrconsultants.org via Hostinger DNS CNAME)
#   Backend  → Render  (Docker web service, auto-deploy from GitHub)
#   Domain   → Hostinger (DNS only — no VPS, no nginx, no server to manage)
#
# This file is kept for reference only in case a self-hosted VPS is needed
# in the future. It does NOT apply to the current production setup.
# =============================================================================

# =============================================================================
# MVR Consultants — Nginx Production Configuration (Reference Only)
# Domain: www.mvrconsultants.org (www is canonical)
# =============================================================================
#
# IF you ever migrate to a VPS, follow these steps:
#   1. Copy to /etc/nginx/sites-available/mvrconsultants.org
#   2. Create symlink:  ln -s /etc/nginx/sites-available/mvrconsultants.org \
#                              /etc/nginx/sites-enabled/mvrconsultants.org
#   3. Install cert:    certbot --nginx -d mvrconsultants.org -d www.mvrconsultants.org
#   4. Test:            nginx -t
#   5. Reload:          systemctl reload nginx
#
# =============================================================================

# ── Rate limit zones (nginx-level, before the Rust backend) ──────────────────
# These are a first-line defence; the Rust token-bucket limiters provide the
# precise per-IP enforcement.

# General API zone: 30 req/s burst allowed; 10 req/s steady state
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;

# Login endpoint: 5 req/s (in addition to the backend token-bucket limiter)
limit_req_zone $binary_remote_addr zone=api_login:10m  rate=5r/s;

# ── HTTP → HTTPS redirect (both apex and www) ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mvrconsultants.org www.mvrconsultants.org;

    # Redirect all HTTP → HTTPS www (canonical)
    return 301 https://www.mvrconsultants.org$request_uri;
}

# ── Apex → www redirect (HTTPS) ───────────────────────────────────────────────
# www.mvrconsultants.org is the canonical domain. Apex redirects to www.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mvrconsultants.org;

    ssl_certificate     /etc/letsencrypt/live/mvrconsultants.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mvrconsultants.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.mvrconsultants.org$request_uri;
}

# ── Main HTTPS server block (www canonical) ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mvrconsultants.org;

    # ── SSL — managed by Certbot ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/mvrconsultants.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mvrconsultants.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Real IP extraction (critical for rate limiter correctness) ────────────
    #
    # PROBLEM WITHOUT THIS:
    #   The Rust backend reads X-Forwarded-For to get the real client IP.
    #   If nginx doesn't set set_real_ip_from, a malicious client can inject
    #   their own XFF header (e.g. X-Forwarded-For: 1.2.3.4) and bypass the
    #   IP-based rate limiter by always appearing as a different IP.
    #
    # FIX:
    #   Tell nginx which proxy IPs to trust. Nginx then strips untrusted XFF
    #   headers and sets $remote_addr to the real client IP before forwarding.

    # Trust only localhost (direct server) and common private networks
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    # If behind Cloudflare, uncomment the Cloudflare IPv4 ranges:
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 103.21.244.0/22;
    # set_real_ip_from 103.22.200.0/22;
    # set_real_ip_from 103.31.4.0/22;
    # set_real_ip_from 141.101.64.0/18;
    # set_real_ip_from 108.162.192.0/18;
    # set_real_ip_from 190.93.240.0/20;
    # set_real_ip_from 188.114.96.0/20;
    # set_real_ip_from 197.234.240.0/22;
    # set_real_ip_from 198.41.128.0/17;
    # set_real_ip_from 162.158.0.0/15;
    # set_real_ip_from 104.16.0.0/13;
    # set_real_ip_from 104.24.0.0/14;
    # set_real_ip_from 172.64.0.0/13;
    # set_real_ip_from 131.0.72.0/22;

    # Use the X-Forwarded-For header to resolve the real client IP
    real_ip_header X-Forwarded-For;
    # Use the rightmost (most reliable) IP in the XFF chain
    real_ip_recursive on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mvr_access.log combined;
    error_log  /var/log/nginx/mvr_error.log warn;

    # ── Frontend: Next.js (port 3000 on same host) ────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;

        # Pass the real IP to the upstream application
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        # Apply general rate limit
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
    }

    # ── Backend: Rust API (port 8080) ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cookies must be forwarded unchanged for httpOnly auth cookies
        proxy_pass_header  Set-Cookie;

        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        limit_req zone=api_general burst=10 nodelay;
        limit_req_status 429;
    }

    # ── Login endpoint — extra tight nginx rate limit ─────────────────────────
    location /api/auth/login {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_header  Set-Cookie;

        # Nginx: 5 burst, then 5 req/s; Rust backend: 5 burst, 1 per 10s
        limit_req zone=api_login burst=5 nodelay;
        limit_req_status 429;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        # Immutable cache — Next.js appends content hashes to filenames
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;  # don't pollute access logs with healthcheck spam
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_vary on;
    gzip_min_length 1024;

    # ── Client body size limit ────────────────────────────────────────────────
    # SOP text upload: max 64KB of plain text (3,000 words ≈ 20KB raw)
    # Blog/image upload: allow up to 10MB for Cloudinary pre-upload
    client_max_body_size 10M;
}
