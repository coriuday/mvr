worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    # X-Forwarded-For removed from log format to avoid leaking client IPs in plaintext logs
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Global security headers ────────────────────────────────────────────────
    # Applied to every response before location-specific overrides.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Hide nginx version (prevents fingerprinting)
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/m;

    # Upstream servers
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:8080;
        keepalive 32;
    }

    # ── HTTP server: redirect all traffic to HTTPS ─────────────────────────────
    # C-3 security fix: HTTP is no longer served directly.
    # The only exception is the Let's Encrypt ACME challenge for cert renewal.
    #
    # NOTE: In production (Render + Vercel) TLS is terminated at the platform edge.
    # This nginx config applies to VPS/self-hosted Docker deployments only.
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge — must be served over HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # All other HTTP → permanent redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ───────────────────────────────────────────────────────────
    # C-3 security fix: primary server block runs on TLS only.
    # For local Docker dev without certs, see nginx.dev.conf.
    #
    # Certificate paths: mount via Docker volume, e.g.:
    #   volumes:
    #     - /etc/letsencrypt/live/mvrconsultants.org/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
    #     - /etc/letsencrypt/live/mvrconsultants.org/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    server {
        listen 443 ssl http2;
        server_name mvrconsultants.org www.mvrconsultants.org;

        # TLS certificates (provisioned by Certbot / Let's Encrypt)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # HSTS — tells browsers to always use HTTPS for this domain (1 year)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # API requests → Rust backend
        location /api/ {
            limit_req zone=api burst=40 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            # M-3 fix: set X-Real-IP so the backend can use it for rate limiting
            # without being confused by multi-hop X-Forwarded-For chains.
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90;
            proxy_connect_timeout 90;
            proxy_send_timeout 90;

            # M-4 security fix: API responses are JSON — block all resource loading
            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
            add_header X-Content-Type-Options "nosniff" always;

            # Extra rate limiting for the contact endpoint
            location /api/contact {
                limit_req zone=contact burst=3 nodelay;
                proxy_pass http://backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
            }
        }

        # Health check — bypass rate limiting
        location /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # All other requests → Next.js frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Accept-Encoding "";
        }

        # Static assets — long cache TTL
        location ~* \.(ico|css|js|gif|jpeg|jpg|png|webp|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
