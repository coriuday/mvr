name: PR Checks

on:
  pull_request:
    branches: [master, dev]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Diff-aware: only run backend check if Rust files changed ─────────────────
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-pr:
    name: Backend PR check
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: cargo-pr-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: fmt check
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test

  frontend-pr:
    name: Frontend PR check
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Audit npm dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://mvr-backend.onrender.com
          NEXT_PUBLIC_APP_URL: https://www.mvrconsultants.org

  # ── Summary job: PRs to main must pass all checks ────────────────────────────
  pr-gate:
    name: PR Gate (required)
    needs: [backend-pr, frontend-pr]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend-pr.result }}" == "failure" || "${{ needs.frontend-pr.result }}" == "failure" ]]; then
            echo "❌ One or more PR checks failed"
            exit 1
          fi
          echo "✅ All PR checks passed"
