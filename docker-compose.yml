# =============================================================================
# MVR Consultants — Docker Compose
# Services: frontend, backend (Rust/Axum), nginx, redis (optional)
# Database: Supabase (external — no local postgres container needed)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Frontend — Next.js 15
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: mvr-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mvr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Backend — Rust + Axum
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mvr-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
      - JWT_REFRESH_EXPIRY_DAYS=${JWT_REFRESH_EXPIRY_DAYS:-30}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_UPLOAD_PRESET=${CLOUDINARY_UPLOAD_PRESET:-mvr_consultants}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-MVR Consultants}
      # Admin notification recipients (BUG-005: previously missing)
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_EMAIL_GUNTUR=${ADMIN_EMAIL_GUNTUR}
      # NOTE: REDIS_URL removed — Rust backend has no Redis config (BUG-006)
      - RUST_LOG=${RUST_LOG:-info}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8080
    # M-10 security fix: Backend port is NOT published to the host.
    # Only nginx (in the same Docker network) can reach it.
    # Direct access to port 8080 from outside the host is blocked.
    expose:
      - "8080"
    networks:
      - mvr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: mvr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend
    networks:
      - mvr-network

  # ---------------------------------------------------------------------------
  # Redis — Optional Caching (enable with: docker compose --profile cache up)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mvr-redis
    restart: unless-stopped
    profiles:
      - cache
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    # M-11 security fix: Redis port is NOT published to the host.
    # Redis must only be reachable within the mvr-network Docker bridge.
    # Remove this comment and add `ports: - "127.0.0.1:6379:6379"` ONLY
    # if you need local debug access, and only temporarily.
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - mvr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  mvr-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis-data:
    driver: local
  nginx-certs:
    driver: local
