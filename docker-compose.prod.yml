version: "3.9"

# =============================================================================
# ⚠️  ARCHIVED — NOT IN USE
# =============================================================================
# Deployment architecture:
#   Frontend → Vercel  (www.mvrconsultants.org, auto-deploy from GitHub)
#   Backend  → Render  (uses render.yaml + Render's own Docker build pipeline)
#   Domain   → Hostinger (DNS only — CNAME to Vercel, no VPS to manage)
#
# This file is kept for reference only. Use render.yaml for backend config.
# =============================================================================

# =============================================================================
# MVR Consultants — Docker Compose (Reference / VPS Fallback Only)
# =============================================================================

services:

  # ── Rust Backend API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mvr-backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - PORT=8080
    env_file:
      - ./backend/.env.production   # Never commit this file
    expose:
      - "8080"   # Only exposed to nginx, not the public internet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - mvr-internal
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  # Handles TLS termination, XFF trust, rate limiting, and request routing.
  # In production, replace this with the host-level nginx config at:
  #   /etc/nginx/sites-available/mvrconsultants.com
  nginx:
    image: nginx:1.27-alpine
    container_name: mvr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/mvrconsultants.com.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro    # TLS certificates from certbot
      - nginx-logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mvr-internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  mvr-internal:
    driver: bridge
    # Isolated network — backend not reachable from the public internet directly

volumes:
  nginx-logs:
    driver: local
